<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Agent Monitor</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Agent Monitor</h1>
    <div class="filters">
      <input id="userId" placeholder="user_id (optional)" />
      <input id="sessionId" placeholder="session_id (optional)" />
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>

  <main class="grid">
    <section>
      <h2>Recent requests (correlation_id)</h2>
      <ul id="corrList"></ul>
    </section>

    <section>
      <h2>Timeline</h2>
      <div id="timelineMeta" class="muted"></div>
      <pre id="timeline"></pre>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
